name: Feature request
description: Suggest an improvement to BrrainzBot.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What should BrrainzBot do?
    validations:
      required: true
