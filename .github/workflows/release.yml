name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, for example 0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            rid: linux-x64
            archive: tar.gz
          - runner: macos-latest
            rid: osx-arm64
            archive: tar.gz
          - runner: windows-latest
            rid: win-x64
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish
        run: dotnet publish src/BrrainzBot.Cli/BrrainzBot.Cli.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:Version=${{ inputs.version }} -o artifacts/${{ matrix.rid }}

      - name: Archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path artifacts/${{ matrix.rid }}/* -DestinationPath artifacts/brrainzbot-${{ inputs.version }}-${{ matrix.rid }}.zip

      - name: Archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: tar -czf artifacts/brrainzbot-${{ inputs.version }}-${{ matrix.rid }}.tar.gz -C artifacts/${{ matrix.rid }} .

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          shasum -a 256 brrainzbot-${{ inputs.version }}-${{ matrix.rid }}.* > brrainzbot-${{ inputs.version }}-${{ matrix.rid }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: artifacts/brrainzbot-${{ inputs.version }}-${{ matrix.rid }}*

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find release-artifacts -type f -exec cp {} dist/ \;

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" dist/* \
            --title "v${{ inputs.version }}" \
            --generate-notes
