name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, for example 0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.normalize.outputs.version }}
      tag: ${{ steps.normalize.outputs.tag }}
    steps:
      - id: normalize
        shell: bash
        run: |
          raw_version="${{ inputs.version }}"
          version="${raw_version#v}"
          version="${version#V}"

          if [[ ! "${version}" =~ ^[0-9]+(\.[0-9]+){2}(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version input: ${raw_version}. Use 0.1.0 or v0.1.0." >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            rid: linux-x64
            archive: tar.gz
          - runner: macos-latest
            rid: osx-arm64
            archive: tar.gz
          - runner: windows-latest
            rid: win-x64
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish
        run: dotnet publish src/BrrainzBot.Cli/BrrainzBot.Cli.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:Version=${{ needs.prepare.outputs.version }} -o artifacts/${{ matrix.rid }}

      - name: Archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path artifacts/${{ matrix.rid }}/* -DestinationPath artifacts/brrainzbot-${{ needs.prepare.outputs.version }}-${{ matrix.rid }}.zip

      - name: Archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: tar -czf artifacts/brrainzbot-${{ needs.prepare.outputs.version }}-${{ matrix.rid }}.tar.gz -C artifacts/${{ matrix.rid }} .

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          shasum -a 256 brrainzbot-${{ needs.prepare.outputs.version }}-${{ matrix.rid }}.* > brrainzbot-${{ needs.prepare.outputs.version }}-${{ matrix.rid }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: artifacts/brrainzbot-${{ needs.prepare.outputs.version }}-${{ matrix.rid }}*

  publish-release:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find release-artifacts -type f -exec cp {} dist/ \;

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.prepare.outputs.tag }}" dist/* \
            --title "${{ needs.prepare.outputs.tag }}" \
            --generate-notes
