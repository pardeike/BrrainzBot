name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore BrrainzBot.slnx

      - name: Build
        run: dotnet build BrrainzBot.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test BrrainzBot.slnx --configuration Release --no-build

      - name: Publish smoke test
        run: dotnet publish src/BrrainzBot.Cli/BrrainzBot.Cli.csproj -c Release -r linux-x64 --self-contained false -p:PublishSingleFile=true -o artifacts/smoke

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install -r docs/requirements.txt

      - name: Build docs
        run: mkdocs build --strict
