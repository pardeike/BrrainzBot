site_name: BrrainzBot
site_description: Self-hosted Discord onboarding and spam defense
site_url: https://pardeike.github.io/BrrainzBot/
repo_url: https://github.com/pardeike/BrrainzBot
repo_name: pardeike/BrrainzBot
theme:
  name: material
  logo: assets/brand/brrainzbot-mark.png
  favicon: assets/brand/brrainzbot-mark.png
  palette:
    primary: custom
    accent: custom
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - javascripts/extra.js
nav:
  - Home: index.md
  - Installation: installation.md
  - Discord Setup: discord-setup.md
  - Configuration: configuration.md
  - OpenAI-Compatible Endpoints: openai-compatible.md
  - Operations: operations.md
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
